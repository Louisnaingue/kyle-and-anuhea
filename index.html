<script>
    const video = document.getElementById("scrollVideo");
    const btn = document.getElementById("videoBtn");
    const videoSection = document.querySelector(".video-section");
    
    let soundEnabled = false;
    
    // keep autoplay silent (mobile safe)
    video.muted = true;
    video.play().catch(() => {});
    
    // 👇 SHOW BUTTON EVERY TIME USER TOUCHES VIDEO AREA
    function showButton() {
        btn.classList.add("show");
    }
    
    // reset trigger so it works EVERY time
    function enableTouchReveal() {
        videoSection.addEventListener("touchstart", showButton, { once: true });
        videoSection.addEventListener("click", showButton, { once: true });
    }
    
    // start first time
    enableTouchReveal();
    
    // 👇 BUTTON ACTION
    btn.addEventListener("click", async () => {
        if (!soundEnabled) {
            video.muted = false;
            video.volume = 1;
    
            try {
                await video.play();
            } catch (e) {}
    
            btn.textContent = "❚❚";
            soundEnabled = true;
    
            // hide button after activation
            setTimeout(() => {
                btn.classList.remove("show");
    
                enableTouchReveal();
    
            }, 600);
    
        } else {
            video.pause();
            btn.textContent = "▶";
            soundEnabled = false;
    
            btn.classList.add("show");
    
            // re-enable touch again
            enableTouchReveal();
        }
    });
</script>
<script>
    const weddingDate = new Date("August 14, 2026 00:00:00").getTime();
    
    const timer = setInterval(function() {
    
        const now = new Date().getTime();
        const distance = weddingDate - now;
    
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
    
        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = hours;
        document.getElementById("minutes").innerText = minutes;
        document.getElementById("seconds").innerText = seconds;
    
        if (distance < 0) {
            clearInterval(timer);
            document.querySelector(".countdown").innerHTML = "IT'S WEDDING DAY 💍";
        }
    
    }, 1000);
</script>
</html>
